<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zomato Pro</title>

<!-- Link CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
    <h1>ZomatoCLone</h1>
    <p>Discover the best food & drinks</p>
    <input type="text" id="search" placeholder="Search for food...">
</header>

<section class="filters">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('veg')">Veg</button>
    <button onclick="filterCategory('nonveg')">Non-Veg</button>
    <button onclick="filterCategory('fastfood')">Fast Food</button>
</section>

<section class="container" id="foodContainer"></section>

<aside class="cart">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="total">0</span></div>
    <button class="checkout" onclick="checkout()">Checkout</button>
</aside>

<!-- Link JavaScript -->
<script src="script.js"></script>

</body>
</html>
